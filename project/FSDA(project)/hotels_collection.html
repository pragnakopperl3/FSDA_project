<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia - Global Hotel Properties</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
        }
        /* Navbar */
        nav {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.5rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2rem;
            margin: 0;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }
        .nav-links a.active { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 5px; }

        /* Hero */
        header {
            text-align: center;
            padding: 6rem 1rem;
            background: linear-gradient(to bottom, transparent, var(--dark-bg)), url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?q=80&w=2000&auto=format&fit=crop') center/cover;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--gold);
            margin: 0 0 1rem 0;
        }
        header p {
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.2rem;
            color: #ddd;
        }

        /* Filter Section */
        .filter-section {
            padding: 2rem 5%;
            background: var(--card-bg);
            display: flex;
            justify-content: center;
            gap: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
        }
        .filter-section input, .filter-section select {
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            color: white;
            border-radius: 4px;
            font-family: 'Inter';
            outline: none;
        }
        .filter-section input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* Rooms Grid */
        .rooms-container {
            padding: 4rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }
        .room-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .room-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border-color: rgba(212, 175, 55, 0.4);
        }
        .room-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 2px solid var(--gold);
        }
        .room-info {
            padding: 2rem 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .room-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            color: white;
        }
        .room-facilities {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 1.5rem;
        }
        .room-price {
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: 600;
            margin-top: auto;
            margin-bottom: 1rem;
        }
        .room-price span {
            font-size: 0.9rem;
            color: #888;
            font-weight: 300;
        }
        .book-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 1rem;
            margin-top: auto;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
        }
        .book-btn.disabled {
            background: #333;
            color: #666;
            border-color: #333;
            cursor: not-allowed;
        }
        .book-btn:not(.disabled):hover {
            background: var(--gold);
            color: black;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem;
            background: #050505;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .availability { display: inline-block; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 1px; }
        .avail-high { background: rgba(0, 200, 80, 0.1); color: #00e676; border: 1px solid rgba(0, 200, 80, 0.3); }
        .avail-low { background: rgba(255, 150, 0, 0.1); color: #ffb300; border: 1px solid rgba(255, 150, 0, 0.3); }
        .avail-none { background: rgba(255, 50, 50, 0.1); color: #ff5252; border: 1px solid rgba(255, 50, 50, 0.3); }

    </style>
</head>
<body>

    <nav>
        <h1 class="logo">Aurelia</h1>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="memberships.html">Memberships</a>
            <a href="#" class="active">Global Hotels</a>
            <a href="rooms_booking.html">Rooms & Suites</a>
            <a href="booking_history.html">History</a>
            <a href="feedback.html">Feedback</a>
            <a href="logout.html" style="display: flex; align-items: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </div>
    </nav>

    <header>
        <h1>Global Availability</h1>
        <p>Your membership tier guarantees privileged access to these world-renowned estates.</p>
    </header>

    <div class="filter-section">
        <input type="date" title="Check-in Date">
        <input type="date" title="Check-out Date">
        <select>
            <option>1 Guest</option>
            <option>2 Guests</option>
            <option>3 Guests</option>
            <option>4+ Guests</option>
        </select>
        <button class="book-btn" style="background: var(--gold); color: black;">Check Availability</button>
    </div>

    <div class="rooms-container" id="hotelsGrid">
        <!-- JS will populate exactly 20 hotel cards here -->
    </div>

    <footer>
        <p>&copy; 2026 Aurelia Luxury Hotel. All rights reserved.</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tier = urlParams.get('tier') || 'silver';

        let validImages = [];
        let prefix = "";

        if (tier === 'silver') {
            document.title = "Aurelia - Silver Member Hotels";
            validImages = [
                "1566073771259-6a8506099945", "1520250497591-112f2f40a3f4", "1480074568708-e7b720bb3f09",
                "1561501900-3701fa6a0864", "1582719478250-c89cae4dc85b", "1540544660406-6a69dacb2804",
                "1564013799919-ab600027ffc6", "1521783988139-89397d761dce", "1533759413974-9e15f3b745ac",
                "1518733057094-95b53143d2a7", "1578683010236-d716f9a3f461", "1590490360182-c33d57733427",
                "1566665797739-1674de7a421a", "1611892440504-42a792e24d32", "1631049307264-da0ec9d70304",
                "1505691938895-1758d7feb511", "1584622650111-993a426fbf0a", "1592229505726-ca121723b8ef",
                "1596436889106-be35e843f974", "1519999482648-25049ddd37b1"
            ];
            prefix = "Silver Estate";
        } else if (tier === 'gold') {
            document.title = "Aurelia - Gold Member Hotels";
            validImages = [
                "1719658928410-5d210a7acfd0", "1663659508974-4f178e40d8d7", "1564078516393-cf04bd966897",
                "1664189767954-e4e605ae46da", "1709630998854-4211edcf3e51", "1678913307977-aef05ef2df60",
                "1723119787969-954b056bcd0b", "1720540244592-b4124532b318", "1748741426070-f11ac876e7dd",
                "1678913308053-316cee77afe9", "1582719478250-c89cae4dc85b", "1738407274756-25325763dd4e",
                "1663659510972-40b5c18317fd", "1678913355695-2f6c08243ce5", "1610019859516-47142326c7b3",
                "1610019858577-5622e0ac05ab", "1756504473784-f36ce0e6778c", "1709630998478-7c310df16bc0",
                "1610019858299-6e616c04d9b4", "1756245994834-61974c290b61"
            ];
            prefix = "Gold Heritage";
        } else {
            document.title = "Aurelia - Platinum Member Hotels";
            validImages = [
                "1729615385477-2e5ebc2ef43d", "1614506660579-c6c478e2f349", "1703460755794-13248f18ccca",
                "1695686017650-f2a8d6a498ce", "1649158778991-f51c744b0990", "1610019858718-7f928ccbdf61",
                "1656789280583-e06c4f88f8eb", "1729673767371-6ab3e30489bc", "1655853116923-eb7758c41522",
                "1649158779127-d3c740ddeddd", "1729606187877-7820c7f51df8", "1551441467-4d0f1120ee64",
                "1663659505064-1ea38cbdcef1", "1655853109174-c5ab3d1e3632", "1729606187987-60b2beb3e639",
                "1729606188713-814d1b7bf893", "1756504473770-2fab6e0df54d", "1673378832239-535cf2b5c674",
                "1672055290450-0fbc026c5b21", "1738407282253-979e31f45785"
            ];
            prefix = "Platinum Summit";
        }

        const locations = [
            prefix + " Paris", prefix + " Milano", prefix + " Maldives", 
            prefix + " Tokyo", prefix + " New York", prefix + " Dubai",
            prefix + " Swiss Alps", prefix + " London", prefix + " Miami", prefix + " Santorini"
        ];

        const grid = document.getElementById('hotelsGrid');

        for(let i = 0; i < 20; i++) {
            const imgId = validImages[i];
            const locName = locations[i % locations.length] + (i >= 10 ? " II" : "");
            
            const rand = Math.random();
            let availClass = "avail-high";
            let availText = "Available Now";
            let btnStatus = "";
            let btnText = "Book Placement";
            
            if(rand > 0.6 && rand <= 0.9) {
                availClass = "avail-low";
                availText = "Only 2 Suites Left";
            } else if(rand > 0.9) {
                availClass = "avail-none";
                availText = "Fully Booked";
                btnStatus = "disabled";
                btnText = "Waitlist Only";
            }

            const card = document.createElement('div');
            card.className = 'room-card';
            
            card.innerHTML = `
                <img src="${imgId.startsWith('http') ? imgId : 'https://images.unsplash.com/photo-' + imgId + '?w=600&auto=format&fit=crop'}" alt="Hotel" class="room-img" loading="lazy">
                <div class="room-info">
                    <h3>${locName}</h3>
                    <div class="room-facilities" style="margin-bottom: 0.5rem;">
                        International Luxury Collection • Elite Member Access
                    </div>
                    <div><span class="availability ${availClass}">${availText}</span></div>
                    <button class="book-btn ${btnStatus}" onclick="${btnStatus === '' ? `saveHotelAndPay('${locName}', '${imgId}')` : 'alert(`Added to Waitlist!`)'}">${btnText}</button>
                </div>
            `;
            grid.appendChild(card);
        }

        function saveHotelAndPay(locName, imgId) {
            const booking = {
                title: locName,
                price: "Included in Tier",
                img: `https://images.unsplash.com/photo-${imgId}?w=600&auto=format&fit=crop`,
                date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
                status: 'Confirmed Placement'
            };
            localStorage.setItem('pendingBooking', JSON.stringify(booking));
            window.location.href = 'payment.html';
        }
    </script>
</body>
</html>
