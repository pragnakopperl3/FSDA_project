<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia - Password Recovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-hover: #F3E5AB;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(15, 15, 15, 0.9);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1643913586401-c7c0b0f1b352?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .recovery-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 3rem 4rem;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            margin-bottom: 2rem;
            color: #ccc;
            font-weight: 300;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #ddd;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .btn {
            background: linear-gradient(135deg, var(--gold), #aa8822);
            color: black;
            border: none;
            padding: 1rem;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .links {
            margin-top: 2rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
        }
        .links a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: white;
            text-decoration: underline;
        }
        .success-message {
            display: none;
            color: #2ecc71;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            animation: fadeIn 0.5s ease-out;
            padding: 1rem;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
    </style>
</head>
<body>
    <div class="recovery-container">
        <h1>Recovery</h1>
        <p class="subtitle" id="instructionText">Enter the email address associated with your account, and we will send you a secure link to reset your password.</p>
        
        <div id="successMessage" class="success-message">
            Reset link successfully dispatched to your email!
        </div>

        <form id="recoveryForm" onsubmit="event.preventDefault(); return handleRecovery();">
            <div class="input-group">
                <label for="email">Account Email</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <button type="submit" class="btn">Send Link</button>
        </form>
        
        <div class="links">
            <a href="user_login.html">← Return to Login</a>
        </div>
    </div>

    <script>
        function handleRecovery() {
            var form = document.getElementById('recoveryForm');
            var msg = document.getElementById('successMessage');
            var subtitle = document.getElementById('instructionText');
            
            form.style.display = 'none';
            subtitle.style.display = 'none';
            msg.style.display = 'block';

            // Optional: Automatically redirect after a few seconds
            // setTimeout(function() { window.location.href = 'user_login.html'; }, 3000);
            return false;
        }
    </script>
</body>
</html>
