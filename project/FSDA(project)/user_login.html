<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia - Guest Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-hover: #F3E5AB;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(15, 15, 15, 0.9);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1643913586401-c7c0b0f1b352?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 3rem 4rem;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            margin-bottom: 2.5rem;
            color: #ccc;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #ddd;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .btn {
            background: linear-gradient(135deg, var(--gold), #aa8822);
            color: black;
            border: none;
            padding: 1rem;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .links {
            margin-top: 2rem;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .links a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Aurelia</h1>
        <p class="subtitle">Guest Login</p>
        <form onsubmit="event.preventDefault(); window.location.href='home.html';">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" required placeholder="Enter your password" style="padding-right: 40px;">
                    <span onclick="const pwd = document.getElementById('password'); if(pwd.type==='password'){pwd.type='text'; this.innerHTML='<svg width=\'20\' height=\'20\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' viewBox=\'0 0 24 24\'><path d=\'M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24\'></path><line x1=\'1\' y1=\'1\' x2=\'23\' y2=\'23\'></line></svg>';}else{pwd.type='password'; this.innerHTML='<svg width=\'20\' height=\'20\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' viewBox=\'0 0 24 24\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'></path><circle cx=\'12\' cy=\'12\' r=\'3\'></circle></svg>';}" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #ccc; display: flex; align-items: center; padding: 5px;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: #ddd;">
                    <input type="checkbox" id="rememberMe"> Remember Me
                </label>
                <a href="forgot_password.html" style="color: var(--gold); text-decoration: none;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Sign In to Continue</button>
        </form>
        <div class="links">
            <a href="admin_login.html">Switch to Admin Portal</a>
            <a href="rooms_booking.html">Skip and View Rooms Directly</a>
        </div>
    </div>
</body>
</html>
