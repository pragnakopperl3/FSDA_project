<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia - Logged Out</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #050505;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1560662105-57f8ad6fa545?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .logout-container {
            text-align: center;
            padding: 4rem;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            max-width: 450px;
            width: 90%;
            animation: fadeIn 1s ease-out;
            border-top: 5px solid var(--gold);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logout-icon {
            margin-bottom: 2rem;
            color: var(--gold);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 400;
        }
        p {
            color: #888;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 300;
        }
        .login-btn {
            display: inline-block;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 1rem 2.5rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.4s;
            border-radius: 4px;
        }
        .login-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transform: translateY(-3px);
        }
        .footer-logo {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="logout-container">
        <div class="logout-icon">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </div>
        <div class="logo">Aurelia</div>
        <h2>You have been logged out</h2>
        <p>Thank you for choosing Aurelia Luxury Hotel. We look forward to welcoming you back to our global estates soon.</p>
        <a href="user_login.html" class="login-btn">Sign In Again</a>
        <div class="footer-logo">EXCELLENCE IN HOSPITALITY</div>
    </div>

    <script>
        // Clear any session-related data if needed
        localStorage.removeItem('pendingBooking');
        // Note: we preserve 'userBookings' as history is persistent for this demo
    </script>
</body>
</html>
