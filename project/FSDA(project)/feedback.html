<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia - Guest Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
        }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav {
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
            padding: 1.5rem 5%; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; margin: 0; }
        .nav-links a { color: white; text-decoration: none; margin-left: 2rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .nav-links a.active { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 5px; }

        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 1rem; }
        
        .feedback-box {
            background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 4rem; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-width: 600px; width: 100%; text-align: center;
        }
        .feedback-box h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-top: 0; margin-bottom: 1rem; }
        .feedback-box p { color: #aaa; margin-bottom: 2.5rem; letter-spacing: 1px; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #ddd; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 1rem; box-sizing: border-box; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 4px; font-family: 'Inter', sans-serif;
            transition: border-color 0.3s; outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
        
        button {
            width: 100%; padding: 1.2rem; background: var(--gold); color: black; border: none; font-size: 1rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; border-radius: 4px; margin-top: 1rem;
        }
        button:hover { background: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        footer { text-align: center; padding: 3rem; background: #050505; color: #666; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <nav>
        <h1 class="logo">Aurelia</h1>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="memberships.html">Memberships</a>
            <a href="hotels_collection.html">Global Hotels</a>
            <a href="rooms_booking.html">Rooms & Suites</a>
            <a href="booking_history.html">History</a>
            <a href="#" class="active">Feedback</a>
            <a href="logout.html">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="feedback-box">
            <h2>Guest Feedback</h2>
            <p>Your esteemed opinion shapes our standard of perfection.</p>
            
            <form onsubmit="event.preventDefault(); alert('Thank you for your valuable feedback! Your response has been securely recorded.'); window.location.href='home.html';">
                <div class="form-group">
                    <label>Guest Name</label>
                    <input type="text" required placeholder="Full Name">
                </div>
                
                <div class="form-group">
                    <label>Property or Room Recently Visited</label>
                    <select required>
                        <option value="" disabled selected>Select Property...</option>
                        <option>Gold Heritage Paris</option>
                        <option>Platinum Summit Maldives</option>
                        <option>Sapphire Water Suite</option>
                        <option>Executive Penthouse</option>
                        <option>Other / Concierge Service</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rate Your Experience</label>
                    <select required>
                        <option value="" disabled selected>Select Rating...</option>
                        <option>⭐⭐⭐⭐⭐ - Flawless Perfection</option>
                        <option>⭐⭐⭐⭐ - Excellent Standards</option>
                        <option>⭐⭐⭐ - Acceptable</option>
                        <option>⭐⭐ - Needs Improvement</option>
                        <option>⭐ - Unsatisfactory</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Detailed Comments</label>
                    <textarea rows="4" placeholder="Please elaborate on your luxury experience..." required></textarea>
                </div>

                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Aurelia Luxury Hotel. All rights reserved.</p>
    </footer>
</body>
</html>
